services:
  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: selenoid
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/home/yhurtado/proyectos/selenium-grid-selenoid/selenoid:/etc/selenoid"
      - "/home/yhurtado/proyectos/selenium-grid-selenoid/selenoid/video:/opt/selenoid/video"
    environment:
      - OVERRIDE_VIDEO_OUTPUT_DIR=/home/yhurtado/proyectos/selenium-grid-selenoid/selenoid/video
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-video-output-dir"
      - "/opt/selenoid/video"
      - "-container-network"
      - "selenoid"
    ports:
      - "4444:4444"
    networks:
      - selenoid

  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: selenoid-ui
    depends_on:
      - selenoid
    ports:
      - "8080:8080"
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"
    networks:
      - selenoid

networks:
  selenoid:
    name: selenoid
