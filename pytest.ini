[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --tb=short --strict-markers
markers =
    smoke: pruebas rápidas de humo
    auth: pruebas de autenticación
    forms: pruebas de formularios
    interactions: pruebas de interacción UI
    dynamic: pruebas con contenido dinámico
    slow: pruebas que tardan más
    flaky: pruebas propensas a fallar, con reintentos automáticos
